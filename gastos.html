<section id="sec-gastos">
    <div class="flex flex-wrap justify-end items-center mb-6 gap-2">
        <!-- 📅 RANGO DE FECHAS (Inicia del 1ro al día actual del sistema, modificable por el usuario) -->
        <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border">
            <span class="text-[10px] font-bold opacity-50 uppercase">Del:</span>
            <input type="date" id="ex-fecha-inicio" onchange="refrescarVistaActual()"
                class="bg-transparent text-[10px] font-bold outline-none cursor-pointer">
        </div>
        <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border">
            <span class="text-[10px] font-bold opacity-50 uppercase">Al:</span>
            <input type="date" id="ex-fecha-fin" onchange="refrescarVistaActual()"
                class="bg-transparent text-[10px] font-bold outline-none cursor-pointer">
        </div>

        <button onclick="exportarFiltradoXLSX('gasto')" class="btn-export">📊 Exportar Gastos</button>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="bg-white p-8 rounded-xl-custom soft-shadow h-fit">
            <h2 class="text-xl font-semibold mb-6 italic">Capturar Gasto</h2>
            <div class="space-y-4">
                <input type="date" id="ex-fecha" class="w-full p-4 rounded-xl bg-gray-50 outline-none text-sm border">
                <select id="ex-categoria" class="w-full p-4 rounded-xl bg-gray-50 outline-none text-sm border"></select>
                <input type="text" id="ex-desc" placeholder="Concepto"
                    class="w-full p-4 rounded-xl bg-gray-50 outline-none text-sm uppercase border">
                <input type="text" id="ex-monto-mask" oninput="formatCurrency(this, 'ex-monto-hidden')"
                    placeholder="$ 0.00 MXN"
                    class="w-full p-4 rounded-xl bg-gray-50 outline-none text-lg input-mxn border">
                <input type="hidden" id="ex-monto-hidden" value="0">
                <button onclick="guardarRegistro('gasto')"
                    class="w-full bg-stone-700 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Guardar
                    Registro</button>
            </div>
        </div>
        <div class="bg-white p-8 rounded-xl-custom soft-shadow">
            <h2 class="text-sm font-bold uppercase opacity-30 mb-6 flex justify-between">Historial <span id="count-ex">0
                    Movimientos</span></h2>
            <div id="lista-gastos" class="list-container space-y-3"></div>
        </div>
    </div>
</section>
